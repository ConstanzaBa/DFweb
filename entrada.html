    <script type="module" src="js/scripts.js"></script>

    <script type="module" src="js/web/components/LanguageToggle.js"></script>
    <script type="module" src="js/web/components/Chatbot.js"></script>
    <script type="module" src="js/web/components/FavoriteButton.js"></script>

    <script type="module" src="js/web/components/Footer.js"></script>
</head>




<body>



    <div id="header" class="header__entrada relative"></div>



    <main class="contenedor">



        <div class="entrada">



            <div class="entrada__info">



                <h2 class="entrada__info__title"></h2>



                <img class="entrada__info__poster no-margin" loading="lazy" src="source/img/poster-1.png"



                    alt="imagen del blog">







                <section class="entrada__info__facts">



                   <button id="favorite-btn" class="entrada__info__facts__favoritos no-margin">
  <input type="checkbox" id="favorite-checkbox" />
  <div class="checkmark">
    <svg viewBox="0 0 256 256">
      <rect fill="none" height="256" width="256"></rect>
      <path
        d="M224.6,51.9a59.5,59.5,0,0,0-43-19.9,60.5,60.5,0,0,0-44,17.6L128,59.1l-7.5-7.4C97.2,28.3,59.2,26.3,35.9,47.4a59.9,59.9,0,0,0-2.3,87l83.1,83.1a15.9,15.9,0,0,0,22.6,0l81-81C243.7,113.2,245.6,75.2,224.6,51.9Z"
        stroke-width="20px"
        stroke="#000"
        fill="none"
      ></path>
    </svg>
  </div>
</button>



                    <span class="entrada__info__facts__release"></span>



                    <span class="entrada__info__facts__time"></span>



                    <span class="entrada__info__facts__average"></span>



                </section>







                <section class="entrada__info__sinopsis">



                    <h3 class="entrada__info__heading" data-translate="Sinopsis"></h3>



                    <p class="entrada__info__texto"></p>



                </section>







                <section class="entrada__info__streaming">



                    <h3 data-translate="streaming">Streaming</h3>



                    <div class="entrada__info__streaming__menu">



                        <ul></ul>



                    </div>



                </section>







                <section class="entrada__info__cinemas">



                    <h3 data-translate="cinemas">Cines</h3>



                    <div class="entrada__info__cinemas__menu">  



                        <ul></ul>



                    </div>



                </section>



            </div>



            <div class="entrada__multimedia">



                <div class="entrada__multimedia__principal">



                    <video src="" loop controls class="video-principal"></video>



                    <h3 class="video-principal-texto" data-translate="trailer"></h3>



                </div>



                <div class="entrada__multimedia__lista">



                    <div class="lista">



                        <img src="source/img/dune.jpg" class="imagen-lista">



                        <h3 class="video-lista-texto" data-translate="trailer"></h3>



                    </div>







                    <div class="lista">



                        <img src="source/img/dune-1.jpg" class="imagen-lista">



                        <h3 class="video-lista-texto" data-translate="captura"></h3>



                    </div>







                    <div class="lista">



                        <img src="source/img/interstellar-2.jpg" class="imagen-lista">



                        <h3 class="video-lista-texto" data-translate="captura"></h3>



                    </div>







                    <div class="lista">



                        <img src="source/img/interstellar-3.jpg" class="imagen-lista">



                        <h3 class="video-lista-texto" data-translate="captura"></h3>



                    </div>







                    <div class="lista">



                        <img src="source/img/interstellar-4.jpg" class="imagen-lista">



                        <h3 class="video-lista-texto" data-translate="captura"></h3>



                    </div>







                    <div class="lista">



                        <img src="source/img/interstellar-5.jpg" class="imagen-lista">



                        <h3 class="video-lista-texto" data-translate="captura"></h3>



                    </div>







                    <div class="lista">



                        <img src="source/img/interstellar-6.jpg" class="imagen-lista">



                        <h3 class="video-lista-texto" data-translate="captura"></h3>



                    </div>







                    <div class="lista">



                        <img src="source/img/interstellar-7.jpg" class="imagen-lista">



                        <h3 class="video-lista-texto" data-translate="captura"></h3>



                    </div>



                </div>







                <section class="entrada__info__elenco">



                    <div class="entrada__info__elenco__lista">



                        <ul>



                            <li></li>



                            <li></li>



                            <li></li>



                            <li></li>



                            <li></li>



                        </ul>



                    </div>



                </section>



            </div>



        </div>



        <div class="entrada__reviews">



            <section class="entrada__reviews__contenedor">



                <h3><i class="fa-solid fa-thumbs-up"></i></h3>







                <div class="slider-container">



                    <div class="card__contenedor" id="opinionCardsGood"></div>  



                </div>



            </section>



            <section class="entrada__reviews__contenedor">



                <h3><i class="fa-solid fa-thumbs-down"></i></h3>







                <div class="slider-container">



                    <div class="card__contenedor" id="opinionCardsBad"></div>



                </div>



            </section>



        </div>



    </main>


    <div id="chatbot"></div>

    <div id="footer"></div>

</html>
