<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perfil de Usuario</title>

  <!-- Normalize -->
  <link rel="preload" href="css/normalize.css" as="style" />
  <link rel="stylesheet" href="css/normalize.css" />

  <!-- Google Fonts (preconnect + preload + stylesheet) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload"
    href="https://fonts.googleapis.com/css2?family=Open+Sans:ital@0;1&family=PT+Sans:wght@400;700&display=swap"
    as="style" crossorigin="anonymous" />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Open+Sans:ital@0;1&family=PT+Sans:wght@400;700&display=swap"
    crossorigin="anonymous" />

  <!-- Material Symbols -->
  <link rel="preload"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" as="style"
    crossorigin="anonymous" />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
    crossorigin="anonymous" />

  <!-- Remix Icon -->
  <link rel="preload" href="https://cdn.jsdelivr.net/npm/remixicon@2.5.0/fonts/remixicon.css" as="style"
    crossorigin="anonymous" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@2.5.0/fonts/remixicon.css"
    crossorigin="anonymous" />

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    crossorigin="anonymous" />

  <!-- Line Icons -->
  <link rel="stylesheet" href="https://cdn.lineicons.com/5.0/lineicons.css" crossorigin="anonymous" />

  <link rel="preload" href="css/styles.css" as="style" />
  <link rel="preload" href="css/index.css" as="style" />
  <link rel="preload" href="css/components/Header.css" as="style" />
  <link rel="preload" href="css/components/LanguageToggle.css" as="style" />
  <link rel="preload" href="css/components/Footer.css" as="style" />
  <link rel="preload" href="css/user/perfil.css" as="style" />


  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/index.css" />
  <link rel="stylesheet" href="css/components/Header.css" />
  <link rel="stylesheet" href="css/components/LanguageToggle.css" />
  <link rel="stylesheet" href="css/components/Footer.css" />
  <link rel="stylesheet" href="css/user/perfil.css" />


  <!-- Scripts -->
  <script src="js/modernizr.js"></script>

  <script type="module" src="js/web/components/Header.js"></script>
  <script type="module" src="js/api/endpoints/GetUserById.js" defer></script>
  <script type="module" src="js/web/components/LanguageToggle.js"></script>
  <script type="module" src="js/web/user/loadUserFavorites.js" defer></script>
  <script type="module" src="js/web/user/loadUserReviews.js" defer></script>
  <script src="js/web/components/Footer.js"></script>
  <script type="module" src="js/scripts.js"></script>
  <script type="module" src="js/web/user/index.js"></script>
</head>

<body>
  <div id="header" class="header__entrada relative"></div>

  <main class="profile-container">
    <header class="profile-header">
      <div class="profile-avatar-container">
        <img alt="Avatar del usuario" id="profile-avatarImg" class="profile-avatar" />
        <button class="profile-editBtn">
          <svg height="1em" viewBox="0 0 512 512">
            <path
              d="M410.3 231l11.3-11.3-33.9-33.9-62.1-62.1L291.7 89.8l-11.3 11.3-22.6 22.6L58.6 322.9c-10.4 10.4-18 23.3-22.2 37.4L1 480.7c-2.5 8.4-.2 17.5 6.1 23.7s15.3 8.5 23.7 6.1l120.3-35.4c14.1-4.2 27-11.8 37.4-22.2L387.7 253.7 410.3 231zM160 399.4l-9.1 22.7c-4 3.1-8.5 5.4-13.3 6.9L59.4 452l23-78.1c1.4-4.9 3.8-9.4 6.9-13.3l22.7-9.1v32c0 8.8 7.2 16 16 16h32zM362.7 18.7L348.3 33.2 325.7 55.8 314.3 67.1l33.9 33.9 62.1 62.1 33.9 33.9 11.3-11.3 22.6-22.6 14.5-14.5c25-25 25-65.5 0-90.5L453.3 18.7c-25-25-65.5-25-90.5 0zm-47.4 168l-144 144c-6.2 6.2-16.4 6.2-22.6 0s-6.2-16.4 0-22.6l144-144c6.2-6.2 16.4-6.2 22.6 0s6.2 16.4 0 22.6z">
            </path>
          </svg>
        </button>
      </div>

      <div>
        <div class="profile-username" id="profile-username">username</div>
        <div class="profile-stats">
          <div class="profile-stat">
            <div id="profile-reviews">0</div>
            <small>Reseñas</small>
          </div>
          <div class="profile-stat">
            <div id="profile-favorites">0</div>
            <small>Favoritos</small>
          </div>
        </div>
      </div>
    </header>

    <!-- Tabs -->
    <div class="tabs">
      <input type="radio" id="tab-recientes" name="tab-control" checked>
      <input type="radio" id="tab-reviews" name="tab-control">
      <input type="radio" id="tab-favorites" name="tab-control">

      <ul>
        <li title="Recientes"><label for="tab-recientes" role="button"><span>Recientes</span></label></li>
        <li title="Reseñas"><label for="tab-reviews" role="button"><span>Reseñas</span></label></li>
        <li title="Favoritos"><label for="tab-favorites" role="button"><span>Favoritos</span></label></li>
      </ul>

      <div class="slider">
        <div class="indicator"></div>
      </div>

      <div class="content">
        <!-- Recientes: favoritos + reseñas -->
        <section>
          <h3 id="fav-label" data-translate="favMovies">Favoritas</h3>
          <div class="peliculas" id="fav-movies">
            <div id="pelicula_card"></div>
          </div>

          <h3 data-translate="userReviews">Reseñas</h3>
          <div class="reviews-carousel" id="user-reviews"></div>
        </section>

        <!-- Reseñas solas -->
        <section>
          <div id="tab-only-reviews"></div>
          <div id="reviews-pagination" class="pagination"></div>
        </section>

        <!-- Favoritos solas -->
        <section>
          <div id="tab-only-favorites"></div>
          <div id="favorites-pagination" class="pagination"></div>
        </section>

      </div>
    </div>

  </main>

  <div id="footer"></div>
</body>

</html>
