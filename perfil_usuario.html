<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DragonFilms</title>

    <link rel="preload" href="css/normalize.css" as="style" />
    <link rel="stylesheet" href="css/normalize.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload"
        href="https://fonts.googleapis.com/css2?family=Open+Sans:ital@0;1&amp;family=PT+Sans:wght@400;700&amp;display=swap"
        crossorigin="anonymous" as="style" />
    <link
        href="https://fonts.googleapis.com/css2?family=Open+Sans:ital@0;1&amp;family=PT+Sans:wght@400;700&amp;display=swap"
        rel="stylesheet" />
    <link rel="preload"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

    <link rel="preload" href="css/styles.css" as="style" />
    <link rel="preload" href="css/user/user.css" as="style" />
    <link rel="preload" href="css/components/Chatbot.css" as="style" />

    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/user/user.css" />
    <link rel="stylesheet" href="css/components/Chatbot.css" />

    <link rel="preload" href="https://cdn.jsdelivr.net/npm/remixicon@2.5.0/fonts/remixicon.css" as="iconos" />
    <link href="https://cdn.jsdelivr.net/npm/remixicon@2.5.0/fonts/remixicon.css" rel="stylesheet" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <script src="https://cdn.jsdelivr.net/npm/admin-lte@3.1/dist/js/adminlte.min.js"></script>

</head>

<body>
    <div id="header-container" class="header__usuario"></div>

    <div class="usuario__detalles">
        <div class="usuario__detalles__info">
        <img id="avatarUsuario" src="source/img/usuario.jpg" alt="Imagen de Perfil"
            class="perfil__imagen__pic" />

            <h2 id="nombreUsuario"></h2>
            <h3 id="emailUsuario"></h3>
        </div>

        <div class="stats-container">
            <div class="stat">
                <div class="circle">
                    <span class="percentage"></span>
                </div>
                <p>Promedio Puntuación Películas</p>
                <div class="circle">
                    <span class="percentage"></span>
                </div>
                <p>Promedio Puntuación Reseñas</p>
            </div>
        </div>
    </div>

    <main class="contenedor">
        <div class="usuario">
            <section class="usuario__estadisticas">
                <h2>Estadísticas</h2>
                <ul>
                    <li>
                        <span id="moviesFavorited"></span>
                        <span>Películas Favoritas</span>
                    </li>
                    <li>
                        <span id="moviesReviewed"></span>
                        <span>Reseñas Realizadas</span>
                    </li>
                    <button>
                        <a href="https://dragonfilms.space/web/estadisticas.html" class="nav-link"> Ver Estadísticas
                            de
                            la Web</a>
                    </button>
                </ul>
            </section>

            <section class="usuario__favoritos">
                <h2>Mis Favoritos</h2>
                <div class="peliculas" id="favoriteMoviesList">
                    <div class="pelicula__card"></div>
                </div>
                <button id="addFavoriteButton">Agregar Película</button>
                <button id="removeFavoriteButton">Eliminar Película</button>
            </section>

            <div id="movieModal" class="modal" style="display: none;">
                <div class="modal-content">
                    <h2>Seleccionar Película</h2>
                    <select id="movieSelectFavorite">
                        <option value=""></option>
                    </select>
                    <div class="modal-buttons">
                        <button id="confirmAddMovie">Agregar</button>
                        <button id="cancelAddMovie">Cancelar</button>
                    </div>
                </div>
            </div>

            <section class="usuario__reseñas">
                <h2>Mis Reseñas</h2>

                <div class="slider-container">
                    <div class="card__contenedor" id="opinionCardsList">
                    </div>
                </div>

                <button id="addReviewButton">Agregar Review</button>
                <button id="removeReviewButton">Eliminar Review</button>
            </section>

            <div id="reviewModal" class="modal" style="display: none;">
                <div class="modal-content">
                    <div class="select">
                        <h2>Seleccionar Película</h2>
                        <select id="movieSelectReview">
                            <option value=""></option>
                        </select>
                    </div>
                    <div class="form">
                        <h2>Escribe tu reseña...</h2>
                        <textarea id="reviewText" placeholder="Escribe tu reseña aquí..."></textarea>
                    </div>
                    <div class="rating">
                        <h2>Califica la película</h2>
                        <div class="star-widget">
                            <input type="radio" name="rate" id="rate-5" value="5" />
                            <label for="rate-5" class="fas fa-star"></label>
                            <input type="radio" name="rate" id="rate-4" value="4" />
                            <label for="rate-4" class="fas fa-star"></label>
                            <input type="radio" name="rate" id="rate-3" value="3" />
                            <label for="rate-3" class="fas fa-star"></label>
                            <input type="radio" name="rate" id="rate-2" value="2" />
                            <label for="rate-2" class="fas fa-star"></label>
                            <input type="radio" name="rate" id="rate-1" value="1" />
                            <label for="rate-1" class="fas fa-star"></label>
                        </div>
                    </div>
                    <div class="modal-buttons">
                        <button id="confirmAddReview">Agregar</button>
                        <button id="cancelAddReview">Cancelar</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <button class="chatbot-button" onclick="toggleChatbot()"><img src="source/img/logo_dragonfilms.png">
    </button>
    
    <div class="chat-container" id="chat-container">
        <div id="chatbox" class="chatbox">
            <div id="chat-log"></div>
        </div>
        <div class="input-container">
            <input type="text" id="userInput" placeholder="Escribe tu mensaje aquí...">
            <button onclick="sendMessage()">Enviar</button>
        </div>
    </div>

    <div id="footer-container"></div>

    <script src="js/modernizr.js"></script>
    <script type="module" src="js/perfil_usuario.js"></script>
</body>

</html>
